site_name: VPforce Documentation
site_url: 'https://docs.vpforce.eu/'
site_description: 'Complete documentation for the VPforce Rhino FFB ecosystem.'
site_author: 'VPforce'
#repo_url: 'https://github.com/walmis/VPforce-Docs'
#edit_uri: blob/master/docs/
copyright: 'Licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC-BY-4.0</a>'

# Documentation directory
docs_dir: docs

# Output directory
site_dir: site

# Navigation structure (ordered by relevance)
nav:
  - Homepage: https://vpforce.eu
  - Welcome: index.md

  - Rhino Manual:
    - Introduction: rhino/index.md
    - Getting Started: rhino/getting-started.md
    - Using the Rhino: rhino/using-the-rhino.md
    - Game-Specific FFB Settings: rhino/game-specific-ffb-settings-tips-and-tricks.md
    - Troubleshooting: rhino/troubleshooting-maintenance.md
    - Game-Specific Troubleshooting: rhino/game-specific-troubleshooting.md
    - Maintenance: rhino/rhino-maintenance.md
    - Known Issues: rhino/appendix-a-known-issues.md
    #- Legacy TelemFFB Docs: rhino/appendix-b-legacy-telemffb-documentation.md
  - Community Projects:
    - Introduction: community-projects/index.md
    - Tips and Tricks: community-projects/tips-and-tricks.md
    - Joysticks:
      - Community Rhino Builds: community-projects/community-rhino-builds.md
      - TheAmazinGreat 86 Motor Base: community-projects/theamazingreat-rhino.md
    - Pedals:
      - Virpil ACE Pedal FFB Mod: community-projects/VirpilACE_FFB_Mod_Guide.md
      - MFG Crosswind FFB Mod: community-projects/MFG_Crosswind_FFB_Mod_Guide.md
      - Tiger TPR FFB Mod: community-projects/Tiger_TPR_FFB_Mod_Guide.md
      - TPR FFB Pedal Mod: community-projects/TPR_FFB_Project_Documentation.md
    - Collectives:
      - Force-Enabled Collective: community-projects/Number481_Force_Enabled_Collective.md
    - Other:
      - FFB Trim Wheel: community-projects/FFB_TrimWheel.md
      - FFB Yoke: community-projects/ffb-yoke.md

  - Third-Party Vendors:
    - Introduction: third-party-vendors/index.md
    - Winger Kits:
      - Monster Rhino: third-party-vendors/winger-kits/monster-rhino.md
    - Kaltokri DIY Kits:
      - Overview: third-party-vendors/kaltokri-kits/index.md
      - General FAQ: third-party-vendors/kaltokri-kits/general-faq.md
      - Rhino Joystick: third-party-vendors/kaltokri-kits/rhinojoystick.md
      - Pedals > RhinoMFG: third-party-vendors/kaltokri-kits/rhinomfg.md
      - Pedals > RhinoMFG86: third-party-vendors/kaltokri-kits/rhinomfg86.md
      - Pedals > RhinoTPR Inside: third-party-vendors/kaltokri-kits/rhinotpr-inside.md
      - Pedals > RhinoTPR Outside: third-party-vendors/kaltokri-kits/rhinotpr-outside.md
      - Pedals > RhinoACE: third-party-vendors/kaltokri-kits/rhinoace.md
      - Pedals > RhinoOrion: third-party-vendors/kaltokri-kits/rhinoorion.md
      - Pedals > RhinoR1: third-party-vendors/kaltokri-kits/rhinor1.md
  - TelemFFB:
    - Overview: telemffb/index.md
    - What's New in 2.0: telemffb/whats-new.md
    - Installation: telemffb/installation.md
    - Configuration: telemffb/configuration.md
    - UI Overview: telemffb/ui-overview.md
    - Aircraft Profiles: telemffb/aircraft-profiles.md
    - Multiple VPforce Devices: telemffb/multi-device.md
    - VPconf Profiles & Gain Overrides: telemffb/vpconf-profiles.md
    - Advanced Spring & G-Force Curves: telemffb/spring-curves.md
    - Sim-Specific Guides:
      - MSFS & X-Plane: telemffb/sim-msfs-xplane.md
      - DCS: telemffb/sim-dcs.md
      - IL-2: telemffb/sim-il2.md
    - Effects Reference: telemffb/effects-reference.md
  - Products:
    - Overview: products/index.md
    - Rhino FFB Base: products/rhino-ffb-base.md
    - DIY Motor Kits: products/diy-kits.md
    - Grip Adapters: products/grip-adapters.md
    - Throw Limiters: products/throw-limiters.md
  - Changelog: changelog.md

watch:
  - docs

theme:
  name: material
  #custom_dir: overrides
  variant: modern
  logo: images/vpforcelogo_dark.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - toc.integrate
  palette:
    scheme: default
    primary: custom
    accent: custom

# Extra CSS for better rendering of your blockquotes and formatting
extra_css:
  - https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap
  - stylesheets/extra.css?v=1.1
  - stylesheets/vpforce.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css

# Extra JavaScript for custom functionality
extra_javascript:
  - javascripts/figure-numbering.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js
  - javascripts/katex-config.js


# Hooks for custom processing (e.g., image path handling, link rewriting)

# Markdown extensions for better formatting support
markdown_extensions:
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 4
      baselevel: 1
      separator: "-"
  - tables
  - smarty
  - attr_list
  - md_in_html
  - admonition
  - def_list
  - footnotes
  - abbr
  - sane_lists
  - pymdownx.highlight
  #- nl2br
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: text
          class: text
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.blocks.caption
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

# Plugins
plugins:
  - autorefs:
      link_titles: true
  - search
  - enumerate-headings:
      toc_depth: 3
      restart_increment_after: 
        - rhino/index.md
        - community-projects/index.md
        - third-party-vendors/index.md
        - telemffb/index.md
        - telemffb/whats-new.md
        - telemffb/installation.md
        - telemffb/configuration.md
        - telemffb/ui-overview.md
        - telemffb/aircraft-profiles.md
        - telemffb/multi-device.md
        - telemffb/vpconf-profiles.md
        - telemffb/spring-curves.md
        - telemffb/sim-msfs-xplane.md
        - telemffb/sim-dcs.md
        - telemffb/sim-il2.md
        - telemffb/effects-reference.md
        - products/index.md
        - changelog.md
        
# Hooks for custom processing (image conversion to WebP, external link processing)
hooks:
  - hooks.py
  
# Extra configuration
extra:
  generator: false
